<!DOCTYPE html>
<html lang="en" class="scroll-smooth light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images\images-removebg-preview.png">
  <title>404 - Page Not Found | EcoRetreat</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Google Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap');
  </style>

  <!-- Tailwind Configuration for your Brand Colors & Dark Mode -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            forest: '#2F5D50',
            sage: '#8FAF8A',
            black: '#000000',
            white: '#FFFFFF',
            offwhite: '#F9FAF9',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Smooth transitions for theme switching */
    .transition-theme {
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }
  </style>
</head>

<body class="bg-offwhite dark:bg-slate-950 text-black dark:text-white font-sans flex flex-col min-h-screen transition-theme">


  <!-- Main Content Wrapper (pt-24 offsets the fixed navbar) -->
  <main class="flex-grow  flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Texture/Image -->
    <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=2940&auto=format&fit=crop" 
         alt="Misty Forest" 
         class="absolute inset-0 w-full h-full object-cover z-0 opacity-20 dark:opacity-10 grayscale mix-blend-overlay">
    
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-offwhite dark:to-slate-950 z-0"></div>

    <!-- 404 Content -->
    <div class="relative z-10 max-w-2xl mx-auto px-6 py-20 text-center">
      
      <!-- 404 Number -->
      <h1 class="text-[8rem] md:text-[12rem] font-heading font-black text-sage leading-none mb-4 drop-shadow-sm select-none">
        404
      </h1>
      
      <!-- Icon & Heading -->
      <div class="w-16 h-16 mx-auto rounded-full bg-forest text-sage flex items-center justify-center text-3xl mb-6 shadow-lg">
        <i class="fa-solid fa-map-location-dot"></i>
      </div>
      
      <h2 class="text-3xl md:text-5xl font-heading font-bold text-forest dark:text-white mb-6">
        Looks like you've wandered off the trail.
      </h2>
      
      <!-- Description -->
      <p class="text-black/70 dark:text-white/70 font-medium text-lg leading-relaxed mb-10 max-w-lg mx-auto">
        The hidden waterfall or private glamping tent you were looking for doesn't exist at this location. Let's get you back to familiar grounds.
      </p>
      
      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
        <a href="index.html" class="w-full sm:w-auto flex items-center justify-center gap-2 px-8 py-4 bg-sage text-black font-bold text-sm tracking-widest uppercase hover:bg-forest hover:text-white transition-colors duration-300 shadow-lg">
          <i class="fa-solid fa-campground"></i>
          <span>Return to Basecamp</span>
        </a>
        <a href="contact.html" class="w-full sm:w-auto flex items-center justify-center gap-2 px-8 py-4 border-2 border-forest dark:border-sage text-forest dark:text-sage font-bold text-sm tracking-widest uppercase hover:bg-forest hover:text-white dark:hover:bg-sage dark:hover:text-black transition-colors duration-300">
          <span>Contact Guide</span>
        </a>
      </div>

    </div>
  </main>


</body>
</html>
